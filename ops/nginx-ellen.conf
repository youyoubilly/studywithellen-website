# Ellen Wang English Studio — HK1 nginx vhost
# Deploy to: /etc/nginx/sites-available/ellen
# Public URL: http://hk1.youyoubilly.com:8080

server {
    listen 8080;
    listen [::]:8080;
    server_name hk1.youyoubilly.com;
    root /var/www/ellen;
    index index.html;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';" always;

    location /book/ {
        proxy_pass http://127.0.0.1:8787/book/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\. {
        deny all;
    }
}
